<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 摄像头区域配置管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        
        .map-section {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            min-height: 600px;
        }
        
        .map-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .map-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .region-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .camera-region {
            position: absolute;
            border: 2px solid;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .camera-region:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }
        
        .camera-region.selected {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .camera-label {
            position: absolute;
            top: -25px;
            left: 5px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            height: fit-content;
        }
        
        .camera-list {
            margin-bottom: 20px;
        }
        
        .camera-item {
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .camera-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .camera-item.active {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.2);
        }
        
        .camera-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .camera-coords {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .coord-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .input-group input {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        
        .input-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .btn {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            margin: 10px 0;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        
        .status.success {
            background: rgba(40, 167, 69, 0.3);
            border: 1px solid #28a745;
        }
        
        .status.error {
            background: rgba(220, 53, 69, 0.3);
            border: 1px solid #dc3545;
        }
        
        .preview-points {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .preview-point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .camera-colors {
            camera1: #ff6b6b;
            camera2: #4ecdc4;
            camera3: #45b7d1;
            camera4: #f39c12;
            camera5: #9b59b6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 摄像头区域配置管理</h1>
        
        <div class="main-content">
            <div class="map-section">
                <h3>平面图与区域覆盖</h3>
                <div class="map-container">
                    <img src="/floorplan.png" alt="平面图" class="map-image" id="mapImage">
                    <div class="region-overlay" id="regionOverlay">
                        <!-- 动态生成的区域框 -->
                    </div>
                    <div class="preview-points" id="previewPoints">
                        <!-- 动态生成的预览点 -->
                    </div>
                </div>
            </div>
            
            <div class="control-panel">
                <h3>🎯 区域配置</h3>
                
                <div class="camera-list" id="cameraList">
                    <!-- 动态生成的摄像头列表 -->
                </div>
                
                <div class="coord-inputs">
                    <div class="input-group">
                        <label>最小 X:</label>
                        <input type="number" id="minX" placeholder="像素坐标">
                    </div>
                    <div class="input-group">
                        <label>最大 X:</label>
                        <input type="number" id="maxX" placeholder="像素坐标">
                    </div>
                    <div class="input-group">
                        <label>最小 Y:</label>
                        <input type="number" id="minY" placeholder="像素坐标">
                    </div>
                    <div class="input-group">
                        <label>最大 Y:</label>
                        <input type="number" id="maxY" placeholder="像素坐标">
                    </div>
                </div>
                
                <button class="btn" onclick="updateCameraRegion()">更新选中区域</button>
                <button class="btn" onclick="generatePreviewPoints()">预览随机点分布</button>
                <button class="btn" onclick="saveAllRegions()">保存所有配置</button>
                <button class="btn" onclick="loadCurrentConfig()">加载当前配置</button>
                
                <div id="status" class="status"></div>
                
                <div style="margin-top: 30px; font-size: 0.9em; opacity: 0.8;">
                    <strong>💡 使用说明:</strong>
                    <ul style="margin: 10px 0; padding-left: 20px;">
                        <li>点击左侧摄像头列表选择要配置的摄像头</li>
                        <li>调整坐标数值定义覆盖区域</li>
                        <li>使用"预览随机点分布"查看效果</li>
                        <li>确认无误后保存配置</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE = '/api';
        
        // 摄像头配置数据
        let cameraRegions = {};
        let selectedCamera = null;
        let mapImageLoaded = false;
        
        // 摄像头颜色配置
        const cameraColors = {
            'camera1': '#ff6b6b',
            'camera2': '#4ecdc4', 
            'camera3': '#45b7d1',
            'camera4': '#f39c12',
            'camera5': '#9b59b6'
        };
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadCurrentConfig();
            
            // 监听地图图片加载完成
            const mapImage = document.getElementById('mapImage');
            mapImage.onload = function() {
                mapImageLoaded = true;
                renderRegionOverlays();
            };
            
            // 监听输入框变化
            ['minX', 'maxX', 'minY', 'maxY'].forEach(id => {
                document.getElementById(id).addEventListener('input', updateSelectedRegion);
            });
        });
        
        // 加载当前配置
        async function loadCurrentConfig() {
            try {
                const response = await fetch(`${API_BASE}/3d_config`);
                const config = await response.json();
                
                if (config.camera_coverage_areas) {
                    cameraRegions = config.camera_coverage_areas;
                } else {
                    // 使用默认配置
                    cameraRegions = {
                        'camera1': {min_pixel_x: 20, max_pixel_x: 340, min_pixel_y: 50, max_pixel_y: 200},
                        'camera2': {min_pixel_x: 340, max_pixel_x: 460, min_pixel_y: 180, max_pixel_y: 380},
                        'camera3': {min_pixel_x: 580, max_pixel_x: 720, min_pixel_y: 50, max_pixel_y: 200}
                    };
                }
                
                renderCameraList();
                renderRegionOverlays();
                showStatus('配置加载成功', 'success');
            } catch (error) {
                showStatus('加载配置失败: ' + error.message, 'error');
            }
        }
        
        // 渲染摄像头列表
        function renderCameraList() {
            const listContainer = document.getElementById('cameraList');
            listContainer.innerHTML = '';
            
            Object.keys(cameraRegions).forEach(cameraId => {
                const region = cameraRegions[cameraId];
                const item = document.createElement('div');
                item.className = 'camera-item';
                item.onclick = () => selectCamera(cameraId);
                
                item.innerHTML = `
                    <div class="camera-name" style="color: ${cameraColors[cameraId] || '#fff'}">${cameraId}</div>
                    <div class="camera-coords">
                        (${region.min_pixel_x}, ${region.min_pixel_y}) - 
                        (${region.max_pixel_x}, ${region.max_pixel_y})
                    </div>
                `;
                
                listContainer.appendChild(item);
            });
        }
        
        // 选择摄像头
        function selectCamera(cameraId) {
            selectedCamera = cameraId;
            const region = cameraRegions[cameraId];
            
            // 更新输入框
            document.getElementById('minX').value = region.min_pixel_x;
            document.getElementById('maxX').value = region.max_pixel_x;
            document.getElementById('minY').value = region.min_pixel_y;
            document.getElementById('maxY').value = region.max_pixel_y;
            
            // 更新UI状态
            document.querySelectorAll('.camera-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.camera-item').classList.add('active');
            
            renderRegionOverlays();
        }
        
        // 渲染区域覆盖图层
        function renderRegionOverlays() {
            if (!mapImageLoaded) return;
            
            const overlay = document.getElementById('regionOverlay');
            overlay.innerHTML = '';
            
            const mapImage = document.getElementById('mapImage');
            const mapRect = mapImage.getBoundingClientRect();
            const containerRect = mapImage.parentElement.getBoundingClientRect();
            
            Object.keys(cameraRegions).forEach(cameraId => {
                const region = cameraRegions[cameraId];
                const regionDiv = document.createElement('div');
                regionDiv.className = 'camera-region';
                regionDiv.style.borderColor = cameraColors[cameraId] || '#fff';
                
                if (selectedCamera === cameraId) {
                    regionDiv.classList.add('selected');
                }
                
                // 计算相对位置和大小（基于图片的实际显示尺寸）
                const left = (region.min_pixel_x / 800) * 100; // 假设原图宽度800px
                const top = (region.min_pixel_y / 600) * 100;  // 假设原图高度600px
                const width = ((region.max_pixel_x - region.min_pixel_x) / 800) * 100;
                const height = ((region.max_pixel_y - region.min_pixel_y) / 600) * 100;
                
                regionDiv.style.left = left + '%';
                regionDiv.style.top = top + '%';
                regionDiv.style.width = width + '%';
                regionDiv.style.height = height + '%';
                
                // 添加标签
                const label = document.createElement('div');
                label.className = 'camera-label';
                label.textContent = cameraId;
                regionDiv.appendChild(label);
                
                regionDiv.onclick = () => selectCamera(cameraId);
                overlay.appendChild(regionDiv);
            });
        }
        
        // 更新选中区域
        function updateSelectedRegion() {
            if (!selectedCamera) return;
            
            const minX = parseInt(document.getElementById('minX').value) || 0;
            const maxX = parseInt(document.getElementById('maxX').value) || 0;
            const minY = parseInt(document.getElementById('minY').value) || 0;
            const maxY = parseInt(document.getElementById('maxY').value) || 0;
            
            cameraRegions[selectedCamera] = {
                min_pixel_x: minX,
                max_pixel_x: maxX,
                min_pixel_y: minY,
                max_pixel_y: maxY
            };
            
            renderCameraList();
            renderRegionOverlays();
        }
        
        // 更新摄像头区域
        function updateCameraRegion() {
            if (!selectedCamera) {
                showStatus('请先选择一个摄像头', 'error');
                return;
            }
            
            updateSelectedRegion();
            showStatus(`${selectedCamera} 区域已更新`, 'success');
        }
        
        // 生成预览点
        function generatePreviewPoints() {
            const previewContainer = document.getElementById('previewPoints');
            previewContainer.innerHTML = '';
            
            if (!selectedCamera) {
                showStatus('请先选择一个摄像头', 'error');
                return;
            }
            
            const region = cameraRegions[selectedCamera];
            const pointCount = 20; // 生成20个预览点
            
            for (let i = 0; i < pointCount; i++) {
                const x = Math.random() * (region.max_pixel_x - region.min_pixel_x) + region.min_pixel_x;
                const y = Math.random() * (region.max_pixel_y - region.min_pixel_y) + region.min_pixel_y;
                
                const point = document.createElement('div');
                point.className = 'preview-point';
                point.style.left = (x / 800) * 100 + '%'; // 基于原图宽度800px
                point.style.top = (y / 600) * 100 + '%';  // 基于原图高度600px
                point.style.background = cameraColors[selectedCamera] || '#00ffff';
                
                previewContainer.appendChild(point);
            }
            
            showStatus(`为 ${selectedCamera} 生成了 ${pointCount} 个预览点`, 'success');
        }
        
        // 保存所有配置
        async function saveAllRegions() {
            try {
                // 这里需要实现一个保存配置的API
                showStatus('配置保存功能需要后端API支持', 'error');
                console.log('保存的配置:', cameraRegions);
            } catch (error) {
                showStatus('保存配置失败: ' + error.message, 'error');
            }
        }
        
        // 显示状态消息
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
