<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件点布局控制</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .control-section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            background: #f8f9fa;
        }
        
        .control-section h3 {
            margin-top: 0;
            color: #495057;
            font-size: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
        }
        
        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .preview {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 6px;
        }
        
        .layout-demo {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        
        .demo-box {
            flex: 1;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            text-align: center;
            background: white;
        }
        
        .demo-box.active {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .demo-points {
            position: relative;
            height: 120px;
            margin: 10px 0;
            background: #f1f3f4;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .demo-camera {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #dc3545;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .demo-event {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #17a2b8;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 事件点布局控制面板</h1>
        
        <div class="control-section">
            <h3>布局模式</h3>
            <div class="form-group">
                <label for="layoutMode">选择布局模式:</label>
                <select id="layoutMode">
                    <option value="grid">网格布局 (推荐)</option>
                    <option value="spiral">螺旋布局</option>
                    <option value="random">随机布局</option>
                </select>
            </div>
            
            <div class="layout-demo">
                <div class="demo-box" data-mode="grid">
                    <strong>网格布局</strong>
                    <div class="demo-points">
                        <div class="demo-camera"></div>
                        <!-- 网格布局示例点 -->
                    </div>
                    <small>整齐排列，避免重叠</small>
                </div>
                
                <div class="demo-box" data-mode="spiral">
                    <strong>螺旋布局</strong>
                    <div class="demo-points">
                        <div class="demo-camera"></div>
                        <!-- 螺旋布局示例点 -->
                    </div>
                    <small>螺旋分布，美观自然</small>
                </div>
                
                <div class="demo-box" data-mode="random">
                    <strong>随机布局</strong>
                    <div class="demo-points">
                        <div class="demo-camera"></div>
                        <!-- 随机布局示例点 -->
                    </div>
                    <small>随机分散，可能重叠</small>
                </div>
            </div>
        </div>
        
        <div class="control-section">
            <h3>布局参数</h3>
            
            <div class="form-group" id="gridSettings">
                <label for="gridSpacing">网格间距 (像素):</label>
                <input type="number" id="gridSpacing" min="20" max="100" value="45">
            </div>
            
            <div class="form-group" id="spiralSettings" style="display: none;">
                <label for="spiralRadiusStep">螺旋半径步进 (像素):</label>
                <input type="number" id="spiralRadiusStep" min="20" max="100" value="35">
            </div>
            
            <div class="form-group" id="randomSettings" style="display: none;">
                <label for="randomOffsetRange">随机偏移范围 (像素):</label>
                <input type="number" id="randomOffsetRange" min="30" max="150" value="80">
            </div>
        </div>
        
        <div style="text-align: center;">
            <button class="btn" onclick="applyLayout()">应用布局设置</button>
            <button class="btn" onclick="loadCurrentConfig()" style="margin-left: 10px; background: #6c757d;">加载当前配置</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="preview">
            <strong>💡 使用说明:</strong>
            <ul>
                <li><strong>网格布局</strong>: 以摄像头为中心，整齐排列事件点，推荐用于事件较多的情况</li>
                <li><strong>螺旋布局</strong>: 以摄像头为中心，螺旋形分布事件点，视觉效果美观</li>
                <li><strong>随机布局</strong>: 在摄像头周围随机分布，保持原有特色但可能重叠</li>
                <li>调整参数后点击"应用布局设置"，然后刷新主页面查看效果</li>
            </ul>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE = '/api';
        
        // 加载当前配置
        async function loadCurrentConfig() {
            try {
                const response = await fetch(`${API_BASE}/layout_config`);
                const config = await response.json();
                
                document.getElementById('layoutMode').value = config.mode;
                document.getElementById('gridSpacing').value = config.grid_spacing;
                document.getElementById('spiralRadiusStep').value = config.spiral_radius_step;
                document.getElementById('randomOffsetRange').value = config.random_offset_range;
                
                updateLayoutMode();
                showStatus('当前配置已加载', 'success');
            } catch (error) {
                showStatus('加载配置失败: ' + error.message, 'error');
            }
        }
        
        // 应用布局设置
        async function applyLayout() {
            try {
                const config = {
                    mode: document.getElementById('layoutMode').value,
                    grid_spacing: parseInt(document.getElementById('gridSpacing').value),
                    spiral_radius_step: parseInt(document.getElementById('spiralRadiusStep').value),
                    random_offset_range: parseInt(document.getElementById('randomOffsetRange').value)
                };
                
                const response = await fetch(`${API_BASE}/layout_config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showStatus('布局设置已成功应用！请刷新主页面查看效果。', 'success');
                } else {
                    showStatus('应用设置失败: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('应用设置失败: ' + error.message, 'error');
            }
        }
        
        // 显示状态消息
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
        
        // 更新布局模式相关控件
        function updateLayoutMode() {
            const mode = document.getElementById('layoutMode').value;
            
            // 隐藏所有设置
            document.getElementById('gridSettings').style.display = 'none';
            document.getElementById('spiralSettings').style.display = 'none';
            document.getElementById('randomSettings').style.display = 'none';
            
            // 显示相应设置
            if (mode === 'grid') {
                document.getElementById('gridSettings').style.display = 'block';
            } else if (mode === 'spiral') {
                document.getElementById('spiralSettings').style.display = 'block';
            } else if (mode === 'random') {
                document.getElementById('randomSettings').style.display = 'block';
            }
            
            // 更新演示框
            document.querySelectorAll('.demo-box').forEach(box => {
                box.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
        }
        
        // 事件监听
        document.getElementById('layoutMode').addEventListener('change', updateLayoutMode);
        
        // 生成演示点
        function generateDemoPoints() {
            document.querySelectorAll('.demo-points').forEach((container, index) => {
                const modes = ['grid', 'spiral', 'random'];
                const mode = modes[index];
                
                // 清除现有点
                container.querySelectorAll('.demo-event').forEach(el => el.remove());
                
                // 生成8个演示点
                for (let i = 0; i < 8; i++) {
                    const point = document.createElement('div');
                    point.className = 'demo-event';
                    
                    let x, y;
                    if (mode === 'grid') {
                        const col = i % 3;
                        const row = Math.floor(i / 3);
                        x = 50 + (col - 1) * 15;
                        y = 50 + (row - 1.5) * 15;
                    } else if (mode === 'spiral') {
                        const angle = i * 45;
                        const radius = (Math.floor(i / 6) + 1) * 15;
                        x = 50 + radius * Math.cos(angle * Math.PI / 180);
                        y = 50 + radius * Math.sin(angle * Math.PI / 180);
                    } else {
                        x = 50 + (Math.random() - 0.5) * 60;
                        y = 50 + (Math.random() - 0.5) * 60;
                    }
                    
                    point.style.left = Math.max(0, Math.min(96, x)) + '%';
                    point.style.top = Math.max(0, Math.min(96, y)) + '%';
                    
                    container.appendChild(point);
                }
            });
        }
        
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadCurrentConfig();
            generateDemoPoints();
        });
    </script>
</body>
</html>
