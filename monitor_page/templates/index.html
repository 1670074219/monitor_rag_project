<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .camera-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .camera-card:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .camera-header {
            padding: 10px;
            background-color: #333;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        .camera-feed {
            width: 100%;
            height: auto;
            display: block;
            background-color: #000;
            min-height: 225px; /* Aspect ratio placeholder */
            pointer-events: none; /* Let click pass to card */
        }
        .status {
            padding: 5px;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }
        
        /* Back Button */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #555;
        }

        /* Modal (background) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: rgba(0,0,0,0.9); 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Modal Content (image) */
        .modal-content {
            margin: auto;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* Caption of Modal Image */
        #caption {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
        }

        /* The Close Button */
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
        }

        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="/" class="back-button">← Back to Dashboard</a>
    <h1>Real-time Camera Monitor</h1>
    <p style="text-align: center; color: #666;">Click on any camera to view in full screen</p>
    
    <div class="grid-container">
        {% for camera_id in cameras %}
        <div class="camera-card" onclick="openModal('{{ url_for('video_feed', camera_id=camera_id) }}', '{{ camera_id }}')">
            <div class="camera-header">{{ camera_id }}</div>
            <img src="{{ url_for('video_feed', camera_id=camera_id) }}" class="camera-feed" alt="Feed from {{ camera_id }}">
        </div>
        {% endfor %}
    </div>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="img01">
        <div id="caption"></div>
    </div>

    <script>
        function openModal(src, caption) {
            var modal = document.getElementById("myModal");
            var modalImg = document.getElementById("img01");
            var captionText = document.getElementById("caption");
            
            modal.style.display = "flex";
            modalImg.src = src;
            captionText.innerHTML = caption;
        }

        function closeModal() {
            var modal = document.getElementById("myModal");
            var modalImg = document.getElementById("img01");
            
            modal.style.display = "none";
            modalImg.src = ""; // Stop the stream to save bandwidth
        }

        // Close modal when clicking outside the image
        window.onclick = function(event) {
            var modal = document.getElementById("myModal");
            if (event.target == modal) {
                closeModal();
            }
        }
        
        // Close on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });
    </script>
</body>
</html>
